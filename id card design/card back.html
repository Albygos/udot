  <script>
    window.addEventListener('load', () => {
      document.querySelectorAll('.text-node').forEach(el => {
        const origH = parseFloat(el.getAttribute('data-orig-h')) || el.clientHeight;
        const actualH = el.getBoundingClientRect().height;

        if (actualH > origH + 4) {
          const deltaY = Math.ceil(actualH - origH);
          const parent = el.parentElement;
          if (parent) {
            Array.from(parent.children).forEach(sibling => {
              if (sibling === el) return;
              if (sibling.style.position === 'absolute' && sibling.style.top) {
                const currentTop = parseFloat(sibling.style.top);
                const elTop = el.offsetTop;
                if (!isNaN(currentTop) && currentTop >= elTop + origH - 4) {
                  sibling.style.top = (currentTop + deltaY) + 'px';
                }
              }
            });
          }
        }
      });
    });
  </script>
